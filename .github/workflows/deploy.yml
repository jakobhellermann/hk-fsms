name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Unpack data archives
        run: bash scripts/unpack-data.sh

      - name: Check & test
        run: |
          pnpm check
          pnpm test

      # per-favorite FSM graph OG images (static/og/*.png) — kept out of git; rendered here from the
      # unpacked data via rsvg-convert. `vite build` then copies static/og/ into the build output.
      - name: Render FSM graph OG images
        run: |
          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          node scripts/gen-og-graphs.mjs

      - name: Build
        run: pnpm build
        env:
          BASE_PATH: /${{ github.event.repository.name }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
